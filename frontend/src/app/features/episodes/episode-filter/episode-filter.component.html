<div class="filter-bar">
  <div class="filter-group">
    <label for="name-input" class="filter-label">Nombre</label>
    <input
      id="name-input"
      type="text"
      class="filter-input"
      placeholder="Ej: Pilot, Rickmancing..."
      [ngModel]="name()"
      (ngModelChange)="onNameChange($event)"
    />
  </div>

  <div class="filter-group">
    <label for="season-select" class="filter-label">Temporada</label>
    <select
      id="season-select"
      class="filter-select"
      [ngModel]="season()"
      (ngModelChange)="onSeasonChange($event)"
    >
      <option value="">Todas las temporadas</option>
      @for (s of seasons; track s.value) {
        <option [value]="s.value">{{ s.label }}</option>
      }
    </select>
  </div>

  <div class="filter-group">
    <label for="episode-input" class="filter-label">Código de episodio</label>
    <input
      id="episode-input"
      type="text"
      class="filter-input"
      placeholder="Ej: S01E01"
      [ngModel]="episodeCode()"
      (ngModelChange)="onEpisodeCodeChange($event)"
      [disabled]="!!season()"
    />
  </div>

  <button
    class="clear-btn"
    (click)="clearFilters()"
    [disabled]="!name() && !episodeCode() && !season()"
    aria-label="Limpiar filtros"
  >
    Limpiar
  </button>
</div>
