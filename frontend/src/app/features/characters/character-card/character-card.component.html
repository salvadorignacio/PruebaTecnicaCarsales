<article class="character-card">
  <div class="card-image-wrapper">
    <img
      [src]="character().image"
      [alt]="character().name"
      class="card-image"
      loading="lazy"
    />
    <span class="status-badge" [class]="'status-' + character().status.toLowerCase()">
      {{ character().status }}
    </span>
  </div>

  <div class="card-body">
    <h3 class="character-name">{{ character().name }}</h3>

    <div class="character-info">
      <div class="info-row">
        <span class="info-label">Especie</span>
        <span class="info-value">{{ character().species }}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Género</span>
        <span class="info-value">{{ character().gender }}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Origen</span>
        <span class="info-value">{{ character().originName }}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Ubicación</span>
        <span class="info-value">{{ character().locationName }}</span>
      </div>
    </div>

    <div class="card-footer">
      <span class="episodes-badge">
        {{ character().episodeCount }} episodios
      </span>
    </div>
  </div>
</article>
